<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#e5e2e1",
              "surface-container-highest": "#353534",
              "primary-fixed": "#ffdfa0",
              "on-primary-fixed-variant": "#5c4300",
              "surface-container-lowest": "#0e0e0e",
              "primary": "#ffe2ab",
              "on-primary": "#402d00",
              "surface-bright": "#393939",
              "tertiary-fixed-dim": "#00d9fc",
              "on-secondary-container": "#ffddd2",
              "on-tertiary-fixed-variant": "#004e5c",
              "inverse-on-surface": "#313030",
              "surface-dim": "#131313",
              "surface": "#131313",
              "surface-container": "#201f1f",
              "primary-container": "#ffbf00",
              "tertiary": "#b4efff",
              "secondary-container": "#b73a00",
              "secondary": "#ffb59c",
              "surface-variant": "#353534",
              "on-surface-variant": "#d4c5ab",
              "on-error-container": "#ffdad6",
              "on-tertiary-fixed": "#001f26",
              "primary-fixed-dim": "#fbbc00",
              "on-tertiary": "#003640",
              "on-secondary-fixed": "#390c00",
              "inverse-primary": "#795900",
              "tertiary-container": "#04dcff",
              "secondary-fixed": "#ffdbcf",
              "on-secondary-fixed-variant": "#822700",
              "on-secondary": "#5c1900",
              "error-container": "#93000a",
              "tertiary-fixed": "#aaedff",
              "on-tertiary-container": "#005d6d",
              "surface-container-low": "#1c1b1b",
              "background": "#131313",
              "on-primary-fixed": "#261a00",
              "surface-tint": "#fbbc00",
              "inverse-surface": "#e5e2e1",
              "error": "#ffb4ab",
              "outline": "#9c8f78",
              "on-background": "#e5e2e1",
              "on-primary-container": "#6d5000",
              "on-error": "#690005",
              "surface-container-high": "#2a2a2a",
              "outline-variant": "#504532",
              "secondary-fixed-dim": "#ffb59c"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ar-scan-line {
            background: linear-gradient(to bottom, transparent, #04dcff, transparent);
            height: 100px;
            width: 100%;
            position: absolute;
            top: -100px;
            left: 0;
            opacity: 0.3;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased overflow-hidden">
<!-- AR Camera Feed Background -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Perspective view of an empty high-end dark wooden restaurant table with soft warm bokeh lighting and shadows from nearby window" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZX5P__CmrjzFlDQRsJ836tzjKfMHc4Z2LViqiha45X31KaEqzEO6he-AOc-mFy3g0B8eChceUVEAhIHxKEF0GXoEdYPa8PrzjA0dT_9tdmDgGuYI3kCm9u4_h705jNn_2lzCr-Q4X8AaK8VssMKenWif2x1T70auI3k5gpvuWoMfteEK0hZD327endegDmTphnu41EsnRa90zr5XQrXwZhcdc2K6lKf4z7x5UyRy69Oj32KchafdlctvzOq_zJ9ZCo0wNty0PXWk"/>
<!-- AR Object Simulation (The Steak) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative w-72 h-72">
<!-- Shadow beneath 3D object -->
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-48 h-12 bg-black/40 blur-xl rounded-full scale-110"></div>
<!-- 3D Meat Image -->
<img class="w-full h-full object-contain relative z-10 drop-shadow-2xl" data-alt="High-end studio shot of a perfectly seared ribeye steak on a stone plate with rosemary and garlic butter garnish" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAImmoa6QrDzRpE6RHgSciEuaExd95H9s5c5IJO1ohpOky6XtCIIrkHTD3Qi-eyIwZL_nBFZ2WYKZnWtTk0oQVTWDIJo8gA6AKXQESXjb441QiUfbJmnoUp4Nsxq3dA8HY_3EMuOzUjBgyTNDdhCJgWjzFZxTbhomPsojMc7tgFtiSH8un5moU15g-vmUWP0vnO6n-MVnFw1s1B6Un-ex8Ua6mtZMy3Scu3HYKRt08_mwFd_YkZ7HEhoegyD_X8LEzanSkbD4XcXDw"/>
<!-- AR Tracking Points -->
<div class="absolute top-0 left-0 w-full h-full border-2 border-tertiary-container/30 rounded-xl scale-105"></div>
<div class="ar-scan-line"></div>
</div>
</div>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/60 dark:bg-[#131313]/60 backdrop-blur-xl flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#FFE2AB]" data-icon="menu">menu</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl text-[#FFBF00] uppercase tracking-widest">AROMA AR</h1>
</div>
<div class="flex gap-4">
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container-high/40 text-[#FFE2AB] hover:opacity-80 transition-opacity active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
</button>
</div>
</header>
<!-- UI Overlay Layer -->
<main class="relative z-10 h-screen w-full flex flex-col justify-end p-6 pb-24">
<!-- AR Instructional Prompt -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 w-full px-10 text-center pointer-events-none">
<div class="inline-flex items-center gap-2 bg-tertiary-container/20 text-tertiary px-4 py-2 rounded-full border border-tertiary-container/30 backdrop-blur-md">
<span class="material-symbols-outlined text-sm" data-icon="photo_camera">photo_camera</span>
<span class="text-[10px] uppercase font-label tracking-widest font-semibold">Scanning Surface...</span>
</div>
</div>
<!-- Action Row (Above Card) -->
<div class="flex justify-center gap-4 mb-6">
<button class="w-14 h-14 rounded-full bg-surface-container-high/80 border border-outline-variant/20 flex flex-col items-center justify-center text-primary-container shadow-2xl glass-panel active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="touch_app">touch_app</span>
<span class="text-[8px] uppercase tracking-tighter mt-0.5">Place</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-high/80 border border-outline-variant/20 flex flex-col items-center justify-center text-primary-container shadow-2xl glass-panel active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="3d_rotation">3d_rotation</span>
<span class="text-[8px] uppercase tracking-tighter mt-0.5">Rotate</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-high/80 border border-outline-variant/20 flex flex-col items-center justify-center text-primary-container shadow-2xl glass-panel active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="aspect_ratio">aspect_ratio</span>
<span class="text-[8px] uppercase tracking-tighter mt-0.5">Scale</span>
</button>
</div>
<!-- Floating Dish Card -->
<div class="bg-surface-container-low/80 rounded-lg p-6 glass-panel border border-outline-variant/10 shadow-[0_-12px_32px_rgba(0,0,0,0.4)]">
<div class="flex justify-between items-start mb-2">
<div>
<span class="text-[10px] font-label font-bold text-secondary uppercase tracking-[0.1em] mb-1 block">Chef's Signature</span>
<h2 class="text-xl font-headline font-bold text-on-surface leading-tight">Signature Ribeye Steak</h2>
</div>
<div class="text-right">
<span class="text-xl font-headline font-bold text-primary-container">$38</span>
</div>
</div>
<p class="text-body-md text-on-surface-variant font-body leading-relaxed mb-6">
                A juicy 12oz ribeye served with fresh rosemary, organic garlic butter, and sea salt crust.
            </p>
<div class="flex gap-3">
<button class="flex-1 bg-primary-container text-on-primary-container py-3.5 rounded-md font-bold text-sm uppercase tracking-widest active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="shopping_bag">shopping_bag</span>
                    Add to Order
                </button>
<button class="w-14 bg-surface-container-highest/60 text-primary flex items-center justify-center rounded-md border border-outline-variant/20 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="info" data-weight="fill" style="font-variation-settings: 'FILL' 1;">info</span>
</button>
</div>
</div>
</main>
<!-- Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-8 pb-4 bg-[#131313]/80 dark:bg-[#131313]/80 backdrop-blur-2xl rounded-t-[2rem] z-50 shadow-[0_-12px_32px_rgba(0,0,0,0.4)]">
<a class="flex flex-col items-center justify-center bg-[#FFBF00] text-[#131313] rounded-full p-3 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="view_in_ar">view_in_ar</span>
</a>
<a class="flex flex-col items-center justify-center text-[#FFE2AB]/60 p-3 hover:text-[#FFBF00] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
</a>
<a class="flex flex-col items-center justify-center text-[#FFE2AB]/60 p-3 hover:text-[#FFBF00] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</a>
<a class="flex flex-col items-center justify-center text-[#FFE2AB]/60 p-3 hover:text-[#FFBF00] transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
</a>
</nav>
</body></html>
