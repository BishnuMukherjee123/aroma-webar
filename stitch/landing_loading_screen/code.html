<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            "primary": "#ffe2ab",
            "on-primary": "#402d00",
            "surface-bright": "#393939",
            "tertiary-fixed-dim": "#00d9fc",
            "on-secondary-container": "#ffddd2",
            "on-tertiary-fixed-variant": "#004e5c",
            "inverse-on-surface": "#313030",
            "surface-dim": "#131313",
            "surface": "#131313",
            "surface-container": "#201f1f",
            "primary-container": "#ffbf00",
            "tertiary": "#b4efff",
            "secondary-container": "#b73a00",
            "secondary": "#ffb59c",
            "surface-variant": "#353534",
            "on-surface-variant": "#d4c5ab",
            "on-error-container": "#ffdad6",
            "on-tertiary-fixed": "#001f26",
            "primary-fixed-dim": "#fbbc00",
            "on-tertiary": "#003640",
            "on-secondary-fixed": "#390c00",
            "inverse-primary": "#795900",
            "tertiary-container": "#04dcff",
            "secondary-fixed": "#ffdbcf",
            "on-secondary-fixed-variant": "#822700",
            "on-secondary": "#5c1900",
            "error-container": "#93000a",
            "tertiary-fixed": "#aaedff",
            "on-tertiary-container": "#005d6d",
            "surface-container-low": "#1c1b1b",
            "background": "#131313",
            "on-primary-fixed": "#261a00",
            "surface-tint": "#fbbc00",
            "inverse-surface": "#e5e2e1",
            "error": "#ffb4ab",
            "outline": "#9c8f78",
            "on-background": "#e5e2e1",
            "on-primary-container": "#6d5000",
            "on-error": "#690005",
            "surface-container-high": "#2a2a2a",
            "outline-variant": "#504532",
            "secondary-fixed-dim": "#ffb59c"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},

<style>
    body { background-color: #131313; }
    .spinner-arc {
      border: 3px solid transparent;
      border-top-color: #ffbf00;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .grain-overlay {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-on-surface flex items-center justify-center min-h-screen font-body">
<!-- Mobile Canvas Simulation (390x844) -->
<div class="relative w-[390px] h-[844px] bg-surface overflow-hidden shadow-2xl flex flex-col justify-between">
<!-- Background Texture -->
<div class="absolute inset-0 grain-overlay"></div>
<!-- Ambient Glows -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary-container/10 rounded-full blur-[100px]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-secondary-container/5 rounded-full blur-[120px]"></div>
<!-- Header / Brand Section -->
<div class="relative pt-32 px-8 flex flex-col items-center text-center z-10">
<div class="mb-6">
<!-- Brand Logo from JSON Style -->
<h1 class="text-4xl font-headline font-extrabold text-primary-container uppercase tracking-[0.2em]">
          Aroma AR
        </h1>
<div class="h-1 w-12 bg-primary-container mx-auto mt-2 rounded-full"></div>
</div>
<p class="font-headline text-lg text-primary font-medium tracking-tight">
        Bring flavor to life in AR
      </p>
</div>
<!-- Center: Visual Hero & Loading -->
<div class="relative flex flex-col items-center justify-center flex-grow z-10">
<div class="relative w-48 h-48 mb-12 flex items-center justify-center">
<!-- Abstract Dish Representation (Visual Placeholder) -->
<div class="absolute inset-0 bg-surface-container-high rounded-lg rotate-12 opacity-40"></div>
<div class="absolute inset-4 bg-surface-container-highest rounded-lg -rotate-6 shadow-xl overflow-hidden border border-outline-variant/20">
<div class="w-full h-full bg-gradient-to-br from-surface-container-highest to-surface-dim flex items-center justify-center">
<span class="material-symbols-outlined text-primary/20 text-6xl">view_in_ar</span>
</div>
</div>
<!-- Animated Spinner -->
<div class="absolute bottom-[-24px] flex items-center justify-center">
<div class="spinner-arc"></div>
</div>
</div>
</div>
<!-- Bottom: Action Section -->
<div class="relative pb-16 px-8 flex flex-col items-center z-10">
<div class="w-full space-y-6">
<!-- Primary Action -->
<button class="w-full py-5 bg-primary-container text-on-primary-container font-headline font-bold text-lg rounded-lg shadow-[0_12_32px_rgba(0,0,0,0.4)] hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
          Allow Camera Access
        </button>
<!-- Contextual Help Text -->
<div class="flex flex-col items-center space-y-2">
<p class="text-on-surface-variant font-body text-sm tracking-wide">
            Camera is required for AR
          </p>
<div class="flex items-center gap-2 px-4 py-2 bg-tertiary-container/10 rounded-full">
<span class="material-symbols-outlined text-tertiary-container text-[16px]">info</span>
<span class="text-[10px] font-label uppercase tracking-widest text-tertiary-container font-semibold">Scanning environment...</span>
</div>
</div>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface to-transparent pointer-events-none"></div>
</div>
</body></html>
